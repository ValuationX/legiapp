<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Bill Aid</title>
    <!-- Warm the AdSense connection so its handshake overlaps HTML parse (~100-300ms on mobile). -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin />
    <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net" />
    <!-- Google AdSense (Auto Ads) -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2504590710091105"
      crossorigin="anonymous"
    ></script>
    <script>
      // Apply the saved theme before paint to avoid a light flash in dark mode.
      try {
        var s = JSON.parse(localStorage.getItem('billaid.settings') || '{}');
        var t = s.theme || 'system';
        if (t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets on the wire.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # Security headers on every response. (CSP is intentionally omitted here — roll it
  # out in Content-Security-Policy-Report-Only first, once the AdSense/Vercel/OSM-tile
  # allowlist is validated, then enforce.) NOTE: nginx add_header does not inherit into
  # a location that defines its own add_header, so they are repeated where needed below.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Proxy API calls to the api service.
  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Hashed, content-addressed build assets — cache forever.
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "public, immutable" always;
    expires 1y;
    try_files $uri =404;
  }

  # Never cache the SPA shell, so new chunk hashes are picked up after a deploy.
  location = /index.html {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-cache" always;
  }

  # SPA fallback (inherits the server-level security headers).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
